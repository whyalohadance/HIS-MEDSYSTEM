version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: his_postgres
    environment:
      POSTGRES_DB: medical_db
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user -d medical_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: his_backend
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: medical_user
      DB_PASSWORD: medical123
      DB_DATABASE: medical_db
      JWT_SECRET: medical_super_secret_key_2024
      JWT_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/fonts:/app/fonts

  frontend:
    build: ./frontend
    container_name: his_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
