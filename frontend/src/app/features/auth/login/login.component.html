<div class="login-page" [class.animate]="animState === 'form'">

  <!-- Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="orb orb-4"></div>

  <!-- Dot grid -->
  <div class="dot-grid"></div>

  <!-- Particles -->
  <div class="particle"
    *ngFor="let p of particles"
    [style.left.%]="p.x"
    [style.top.%]="p.y"
    [style.animationDelay]="p.delay"
    [style.animationDuration]="p.duration"
    [style.width.px]="p.size"
    [style.height.px]="p.size">
  </div>

  <!-- Login card -->
  <div class="login-card" [class.visible]="animState === 'form'">

    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-icon">
        <span class="material-icons">local_hospital</span>
      </div>
      <h1 class="logo-title">MedSystem</h1>
      <p class="logo-subtitle">{{ 'AUTH.SUBTITLE' | translate }}</p>
    </div>

    <!-- Form -->
    <form class="login-form" (ngSubmit)="login()">

      <div class="form-group" [class.focused]="emailFocused" [class.has-value]="form.email">
        <input
          type="email"
          [(ngModel)]="form.email"
          name="email"
          (focus)="emailFocused = true"
          (blur)="emailFocused = false"
          autocomplete="email"
          required>
        <label>{{ 'AUTH.EMAIL' | translate }}</label>
      </div>

      <div class="form-group" [class.focused]="passwordFocused" [class.has-value]="form.password">
        <input
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="form.password"
          name="password"
          (focus)="passwordFocused = true"
          (blur)="passwordFocused = false"
          autocomplete="current-password"
          required>
        <label>{{ 'AUTH.PASSWORD' | translate }}</label>
        <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
          <span class="material-icons">{{ showPassword ? 'visibility_off' : 'visibility' }}</span>
        </button>
      </div>

      <div class="error-message" *ngIf="error">
        <span class="material-icons">error_outline</span>
        {{ error }}
      </div>

      <button type="submit" class="btn-login" [class.loading]="isLoading" [disabled]="isLoading">
        <span class="btn-text" *ngIf="!isLoading">{{ 'AUTH.LOGIN_BTN' | translate }}</span>
        <div class="btn-spinner" *ngIf="isLoading"></div>
      </button>

    </form>

    <!-- Demo hint -->
    <div class="demo-hint">
      <span class="material-icons">info</span>
      <div class="demo-accounts">
        <span (click)="fillDemo('admin@med.com')">Admin</span>
        <span class="separator">·</span>
        <span (click)="fillDemo('doctor@med.com')">Doctor</span>
        <span class="separator">·</span>
        <span (click)="fillDemo('reception@med.com')">Reception</span>
        <span class="separator">·</span>
        <span (click)="fillDemo('radiolog@med.com')">Radiolog</span>
      </div>
    </div>

    <!-- Language switcher -->
    <div class="lang-switcher">
      <button *ngFor="let lang of langService.languages"
        [class.active]="langService.getCurrentLanguage() === lang.code"
        (click)="langService.setLanguage(lang.code)">
        {{ lang.flag }} {{ lang.label }}
      </button>
    </div>

  </div>

  <!-- Copyright -->
  <div class="copyright">© 2026 HIS-MedSystem · CUTM</div>

</div>
