<!-- Overlay (mobile only) -->
<div class="sidebar-overlay" [class.active]="isOpen" (click)="sidebarService.close()"></div>

<aside class="sidebar" [class.open]="isOpen" [class.collapsed]="collapsed">

  <div class="sidebar-logo">
    <span class="material-icons logo-icon">local_hospital</span>
    <span class="logo-text" *ngIf="!collapsed">MedSystem</span>
  </div>

  <nav class="sidebar-nav">
    <ng-container *ngFor="let item of navItems">
      <a [routerLink]="item.route" routerLinkActive="active" class="nav-item"
         [title]="item.key | translate"
         (click)="sidebarService.close()">
        <span class="material-icons">{{ item.icon }}</span>
        <span class="nav-label" *ngIf="!collapsed">{{ item.key | translate }}</span>
      </a>
    </ng-container>
  </nav>

  <div class="sidebar-footer">
    <button class="nav-item logout-btn" [title]="'NAV.LOGOUT' | translate" (click)="authService.logout(); sidebarService.close()">
      <span class="material-icons">logout</span>
      <span class="nav-label" *ngIf="!collapsed">{{ 'NAV.LOGOUT' | translate }}</span>
    </button>
  </div>

</aside>
